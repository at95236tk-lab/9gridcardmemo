<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4 カードレイアウト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div><div id="loadingMsg">PDF生成中…</div></div>
<button class="drawer-toggle" id="drawerToggle" type="button" aria-label="設定を開く" aria-controls="sidePanel" aria-expanded="false">☰</button>
<div class="drawer-backdrop" id="drawerBackdrop" aria-hidden="true"></div>

<div class="layout">
  <aside class="sidebar" id="sidePanel">
    <div class="sidebar-inner">
      <div>
        <div class="app-title">A4 カードレイアウト</div>
        <div class="app-info">外：A4　内：<em id="infoInner">B6</em><br>書体：<em id="infoFont">ゴシック</em>　<em id="infoSize">5pt</em></div>
      </div>

      <div class="section">
        <div class="sec-label">ページタイトル</div>
        <input class="title-input" type="text" id="titleInput" value="ページタイトル" oninput="updateTitle()" maxlength="80">
        <div class="toggle-row">
          <button class="toggle-btn active" id="titleVisibilityBtn" onclick="toggleTitleVisibility()">タイトル表示: ON</button>
        </div>
        <div class="pos-grid">
          <button class="pos-btn active" data-pos="top-left" onclick="setTitlePos('top-left')">左上</button>
          <button class="pos-btn" data-pos="top-center" onclick="setTitlePos('top-center')">中央上</button>
          <button class="pos-btn" data-pos="top-right" onclick="setTitlePos('top-right')">右上</button>
          <button class="pos-btn" data-pos="bottom-left" onclick="setTitlePos('bottom-left')">左下</button>
          <button class="pos-btn" data-pos="bottom-center" onclick="setTitlePos('bottom-center')">中央下</button>
          <button class="pos-btn" data-pos="bottom-right" onclick="setTitlePos('bottom-right')">右下</button>
        </div>
      </div>

      <div class="section">
        <div class="sec-label">内側の用紙サイズ</div>
        <div class="group-block"><div class="group-name">A 系</div><div class="btn-row" id="grpA"></div></div>
        <div class="group-block"><div class="group-name">B 系（JIS）</div><div class="btn-row" id="grpB"></div></div>
        <div class="group-block"><div class="group-name">写真・はがき</div><div class="btn-row" id="grpCard"></div></div>
        <div class="group-block"><div class="group-name">手帳</div><div class="btn-row" id="grpBook"></div></div>
        <div class="custom-block">
          <div class="input-line">
            <span>px W</span><input class="nano" type="number" id="customW" placeholder="W" min="50"><span>×</span><input class="nano" type="number" id="customH" placeholder="H" min="50"><button class="apply-btn" onclick="applyCustomPx()">適用</button>
          </div>
          <div class="input-line">
            <span>mm W</span><input class="nano" type="number" id="customMmW" placeholder="W" min="5" step="0.5"><span>×</span><input class="nano" type="number" id="customMmH" placeholder="H" min="5" step="0.5"><button class="apply-btn" onclick="applyCustomMm()">適用</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="sec-label">書体</div>
        <div class="toggle-row">
          <button class="toggle-btn active" id="fontToggleSans" onclick="setFont('sans')">ゴシック</button>
          <button class="toggle-btn" id="fontToggleSerif" onclick="setFont('serif')">明朝</button>
        </div>
      </div>

      <div class="section">
        <div class="sec-label">フォントサイズ</div>
        <div class="slider-row">
          <input type="range" id="ptRange" min="4" max="24" value="5" step="1">
          <span class="slider-val" id="ptLabel">5 pt</span>
        </div>
      </div>

      <div class="section">
        <div class="sec-label">表示倍率</div>
        <div class="slider-row">
          <input type="range" id="scaleRange" min="50" max="300" value="100" step="5">
          <span class="slider-val" id="scaleLabel">100%</span>
        </div>
      </div>

      <div class="section">
        <button class="action-btn" id="editBtn" onclick="toggleEdit()">✏ テキスト編集</button>
        <div class="pdf-group" style="margin-top:4px;">
          <div class="pdf-label">PDF 書き出し</div>
          <button class="action-btn" onclick="exportPDF('web')">⬇ Web 用（72dpi）</button>
          <button class="action-btn" onclick="exportPDF('print')">⬇ 印刷用（300dpi）</button>
        </div>
        <button class="action-btn dim" onclick="window.print()" style="margin-top:4px;">🖨 ブラウザ印刷</button>
      </div>
    </div>
  </aside>

  <main class="canvas-area" id="canvasArea">
    <div class="scale-outer" id="scaleOuter">
      <div class="a4" id="a4">
        <div id="inner-grid"></div>
      </div>
    </div>
    <div class="preview-zoom" id="previewZoom">
      <input type="range" id="previewScaleRange" min="50" max="300" value="100" step="5">
      <div class="preview-zoom-input-wrap">
        <input type="number" id="previewScaleInput" min="50" max="300" step="5" value="100">
        <span>%</span>
      </div>
    </div>
  </main>
</div>

<script src="./app.js"></script>
</body>
</html>
